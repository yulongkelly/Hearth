name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Hearth-Setup.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Hearth.dmg
